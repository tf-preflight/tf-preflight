name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Download
        run: go mod download

      - name: Format check
        run: |
          test -z "$(gofmt -l . | tee /tmp/gofmt.out)" || (cat /tmp/gofmt.out && exit 1)

      - name: Run tests
        run: go test ./...
